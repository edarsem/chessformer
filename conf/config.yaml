defaults:
  - model: small
  - data: local
  - train: default
  - _self_

paths:
  data_dir: data
  checkpoints_dir: checkpoints
  processed_dir: ${paths.data_dir}/processed

wandb:
  project: chessformer
  entity: null   # override via env WANDB_ENTITY or CLI
  enabled: true

# Overridable at CLI for eval and play scripts
checkpoint: null
split: val
mode: human_vs_ai
human_side: white
ai_elo: 2800
white_elo: null   # defaults to ai_elo if null
black_elo: null   # defaults to ai_elo if null
temperature: 1.0
display: ascii
port: 5174
open_browser: true
eval_batch_size: 512   # override on CLI: eval_batch_size=2048
