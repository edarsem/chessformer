# Which data.* key to use for training (override for smoke tests)
train_file: train_games_small_file   # or train_games_tiny_file

batch_size: 256
max_steps: 50000
lr: 1e-3
warmup_steps: 1000
lr_schedule: cosine   # cosine | constant
weight_decay: 0.01
grad_clip: 1.0

# Validation and checkpointing
val_every: 500         # steps
val_max_batches: 200   # cap val batches per eval (null = full val set)
checkpoint_every: 2000 # steps

# Mixed precision (autocast). GradScaler only activates on CUDA.
mixed_precision: true
num_workers: 0      # set to 4+ on CUDA nodes
compile: false      # torch.compile — CUDA only, enable for GPU runs

# Distributed training (activated via torchrun, not set here)
# torchrun --nproc_per_node=N scripts/train.py

# Resume from checkpoint (null = start fresh)
resume_from: null
