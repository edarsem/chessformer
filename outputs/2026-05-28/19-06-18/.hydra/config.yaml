model:
  d_model: 128
  n_heads: 4
  n_layers: 4
  ffn_mult: 4
  dropout: 0.1
  max_seq_len: 80
data:
  pgn_source: ${paths.data_dir}/raw_pgn/lichess_db_standard_rated_2014-09.pgn
  puzzles_source: ${paths.data_dir}/raw_puzzles/lichess_db_puzzle.csv
  train_games: 10000
  val_games_per_elo_bucket: 20
  test_games_per_elo_bucket: 100
  val_puzzles: 500
  test_puzzles: 2000
  puzzle_rating_min: null
  puzzle_rating_max: null
  split_seed: 42
  train_games_file: ${paths.processed_dir}/train_games.parquet
  val_games_file: ${paths.processed_dir}/val_games.parquet
  val_puzzles_file: ${paths.processed_dir}/val_puzzles.parquet
  test_games_file: ${paths.processed_dir}/test_games.parquet
  test_puzzles_file: ${paths.processed_dir}/test_puzzles.parquet
train:
  batch_size: 256
  max_steps: 50000
  lr: 0.001
  warmup_steps: 1000
  lr_schedule: cosine
  weight_decay: 0.01
  grad_clip: 1.0
  val_every: 500
  checkpoint_every: 2000
  mixed_precision: true
  resume_from: null
paths:
  data_dir: data
  checkpoints_dir: checkpoints
  processed_dir: ${paths.data_dir}/processed
wandb:
  project: chessformer
  entity: null
  enabled: true
