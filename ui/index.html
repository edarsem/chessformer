<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chessformer</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #12122a;
  color: #dde;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 18px 12px 40px;
  gap: 14px;
}

h1 {
  font-size: 1.25rem;
  letter-spacing: .08em;
  color: #90b8f0;
  text-transform: uppercase;
}

/* ── Three-column layout ───────────────────────────────────── */
.layout {
  display: flex;
  gap: 20px;
  align-items: flex-start;
  justify-content: center;
  flex-wrap: wrap;
}

/* ── Shared panel/card styles ──────────────────────────────── */
.panel {
  display: flex; flex-direction: column; gap: 12px; width: 230px;
  max-height: calc(100vh - 80px); overflow-y: auto;
}

.card {
  background: #1c1c3a;
  border: 1px solid #2e2e50;
  border-radius: 8px;
  padding: 12px 14px;
}
.card h3 {
  font-size: .72rem;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: #6680aa;
  margin-bottom: 10px;
}

/* ── Form controls ─────────────────────────────────────────── */
label { font-size: .8rem; color: #aab; display: block; margin-bottom: 3px; }
.val  { font-size: .78rem; color: #90b8f0; float: right; }

input[type=range] {
  width: 100%;
  accent-color: #90b8f0;
  margin-bottom: 10px;
}
input[type=number] {
  width: 100%;
  background: #0e0e22;
  border: 1px solid #3a3a60;
  border-radius: 4px;
  color: #dde;
  padding: 5px 8px;
  font-size: .82rem;
  margin-bottom: 8px;
}
input[type=number]:focus { outline: 1px solid #90b8f0; }

select {
  width: 100%;
  background: #1a1a38;
  border: 1px solid #3a3a60;
  border-radius: 5px;
  color: #dde;
  padding: 6px 8px;
  font-size: .82rem;
  margin-bottom: 8px;
  cursor: pointer;
}

.btn {
  width: 100%;
  padding: 7px 10px;
  border-radius: 5px;
  border: 1px solid #3a3a60;
  background: #1a1a38;
  color: #dde;
  font-size: .82rem;
  cursor: pointer;
  margin-bottom: 6px;
  text-align: center;
}
.btn:hover   { background: #2a2a50; }
.btn-primary { background: #133060; border-color: #2060a0; }
.btn-primary:hover { background: #1a4080; }
.btn-danger  { background: #401318; border-color: #802030; }
.btn-danger:hover  { background: #5a1c22; }

.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.toggle-row label { margin: 0; }
input[type=checkbox] { accent-color: #90b8f0; width: 15px; height: 15px; cursor: pointer; }

/* ── Board area ────────────────────────────────────────────── */
.board-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

#board-wrap {
  position: relative;
  width: 600px; height: 600px;
  border: 2px solid #2e2e50;
  border-radius: 4px;
  overflow: visible;
  cursor: pointer;
  flex-shrink: 0;
}

#board-svg {
  position: absolute; top: 0; left: 0;
  width: 600px; height: 600px;
  pointer-events: none;
}
#board-svg svg { width: 600px; height: 600px; display: block; }

#board-overlay {
  position: absolute; top: 0; left: 0;
  width: 600px; height: 600px;
  display: grid;
  grid-template-columns: repeat(8, 75px);
  grid-template-rows:    repeat(8, 75px);
}
.sq { width: 75px; height: 75px; cursor: pointer; }
.sq:hover { background: rgba(255,255,255,.07); }

/* Promotion popup */
#promo-popup {
  display: none;
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: #1e1e40;
  border: 2px solid #404070;
  border-radius: 10px;
  padding: 16px 20px;
  z-index: 20;
  text-align: center;
}
#promo-popup p { font-size: .85rem; margin-bottom: 10px; color: #aab; }
.promo-btn {
  background: #2a2a50;
  border: 1px solid #505090;
  color: #dde;
  padding: 8px 14px; margin: 4px;
  border-radius: 5px; cursor: pointer; font-size: 1.4rem;
}
.promo-btn:hover { background: #3a3a6a; }

/* ── Nav row ───────────────────────────────────────────────── */
.nav-row {
  display: flex; align-items: center; gap: 8px;
}
.nav-btn {
  background: #1c1c3a;
  border: 1px solid #3a3a60;
  color: #aab;
  padding: 5px 12px;
  border-radius: 4px; cursor: pointer; font-size: .95rem;
}
.nav-btn:hover   { background: #2a2a50; }
.nav-btn:disabled { opacity: .3; cursor: default; }
#move-label { font-size: .82rem; color: #888; min-width: 130px; text-align: center; }

#status-bar {
  font-size: .85rem;
  font-weight: 600;
  color: #ffd060;
  min-height: 1.2em;
  text-align: center;
}

/* ── FEN / PGN import ──────────────────────────────────────── */
textarea {
  width: 100%;
  background: #0e0e22;
  border: 1px solid #3a3a60;
  border-radius: 4px;
  color: #ccd;
  padding: 6px 8px;
  font-size: .75rem;
  font-family: monospace;
  resize: vertical;
  margin-bottom: 6px;
}
textarea:focus { outline: 1px solid #90b8f0; }

/* ── Debug / Engine panel ──────────────────────────────────── */
#engine-panel { display: none; }

.prob-row {
  display: flex; align-items: center; gap: 6px; margin-bottom: 3px;
}
.prob-lbl { font-size: .7rem; color: #8a9; width: 28px; flex-shrink: 0; }
.prob-bg  { flex: 1; height: 10px; background: #0e0e22; border-radius: 2px; overflow: hidden; }
.prob-fill { height: 100%; border-radius: 2px; }
.prob-val  { font-size: .7rem; color: #8a9; width: 38px; text-align: right; flex-shrink: 0; }

table { width: 100%; border-collapse: collapse; font-size: .76rem; margin-top: 6px; }
th { color: #6680aa; text-align: left; padding: 2px 5px; font-weight: normal; }
td { padding: 2px 5px; }
tr:nth-child(even) td { background: rgba(255,255,255,.03); }

/* ── Puzzle panel ──────────────────────────────────────────── */
#puzzle-panel { display: none; }

.puzzle-list {
  display: flex; flex-direction: column; gap: 5px;
  max-height: 260px; overflow-y: auto;
  margin-top: 6px;
}
.puzzle-item {
  padding: 6px 10px;
  background: #1a1a38; border: 1px solid #2e2e50;
  border-radius: 5px; cursor: pointer; font-size: .78rem;
}
.puzzle-item:hover { background: #2a2a50; }

.puzzle-progress { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
.dot {
  width: 18px; height: 18px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: .62rem; border: 1px solid #3a3a60;
}
.dot-pending { background: #1e1e40; }
.dot-ok      { background: #0e3520; border-color: #2ea060; color: #2ea060; }
.dot-bad     { background: #350e0e; border-color: #a03030; color: #a03030; }
.dot-cur     { background: #0e2040; border-color: #3090d0; }

/* ── Spinner ───────────────────────────────────────────────── */
#spinner {
  display: none;
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 2.5rem; pointer-events: none; z-index: 999;
}

/* ── Keyboard hint ─────────────────────────────────────────── */
.kbd-hint {
  font-size: .68rem; color: #556; text-align: center; margin-top: 2px;
}
kbd {
  background: #1e1e3a; border: 1px solid #3a3a60;
  border-radius: 3px; padding: 1px 4px; font-size: .68rem; color: #7790bb;
}
</style>
</head>
<body>
<h1>Chessformer</h1>

<div class="layout">

  <!-- ══ LEFT PANEL: Elo + Clocks ══════════════════════════════════════ -->
  <div class="panel">

    <div class="card">
      <h3>Conditioning</h3>

      <label>White Elo <span class="val" id="v-we">2800</span></label>
      <input type="range" id="sl-we" min="800" max="3400" step="100" value="2800"
             oninput="document.getElementById('v-we').textContent=this.value"
             onchange="setSetting('white_elo', +this.value)">

      <label>Black Elo <span class="val" id="v-be">2800</span></label>
      <input type="range" id="sl-be" min="800" max="3400" step="100" value="2800"
             oninput="document.getElementById('v-be').textContent=this.value"
             onchange="setSetting('black_elo', +this.value)">

      <label>White clock (seconds) <span class="val" id="v-wc">120</span></label>
      <input type="range" id="sl-wc" min="0" max="3600" step="10" value="120"
             oninput="document.getElementById('v-wc').textContent=fmtClock(+this.value)"
             onchange="setSetting('white_clock_s', +this.value)">

      <label>Black clock (seconds) <span class="val" id="v-bc">120</span></label>
      <input type="range" id="sl-bc" min="0" max="3600" step="10" value="120"
             oninput="document.getElementById('v-bc').textContent=fmtClock(+this.value)"
             onchange="setSetting('black_clock_s', +this.value)">

      <label>Increment (seconds) <span class="val" id="v-inc">5s</span></label>
      <input type="range" id="sl-inc" min="0" max="30" step="1" value="5"
             oninput="document.getElementById('v-inc').textContent=this.value+'s'"
             onchange="setSetting('increment_s', +this.value)">
    </div>

    <!-- Import -->
    <div class="card">
      <h3>Import FEN / PGN</h3>
      <textarea id="import-text" rows="4" placeholder="Paste FEN or PGN here…"></textarea>
      <button class="btn btn-primary" onclick="importPosition()">Load</button>
    </div>

  </div>

  <!-- ══ CENTER: Board ══════════════════════════════════════════════════ -->
  <div class="board-area">
    <div id="board-wrap">
      <div id="board-svg"></div>
      <div id="board-overlay"></div>
      <div id="promo-popup">
        <p>Promote to:</p>
        <button class="promo-btn" onclick="submitPromo('q')">♛ Q</button>
        <button class="promo-btn" onclick="submitPromo('r')">♜ R</button>
        <button class="promo-btn" onclick="submitPromo('b')">♝ B</button>
        <button class="promo-btn" onclick="submitPromo('n')">♞ N</button>
      </div>
    </div>
    <div class="nav-row">
      <button class="nav-btn" id="btn-first" onclick="navTo(0)"     title="First">⏮</button>
      <button class="nav-btn" id="btn-prev"  onclick="navRel(-1)"   title="Prev ◀">◀</button>
      <span   id="move-label">—</span>
      <button class="nav-btn" id="btn-next"  onclick="navRel(1)"    title="Next ▶">▶</button>
      <button class="nav-btn" id="btn-last"  onclick="navLast()"    title="Last">⏭</button>
    </div>
    <div id="status-bar"></div>
    <div class="kbd-hint">
      <kbd>←</kbd><kbd>→</kbd> navigate &nbsp;
      <kbd>M</kbd> AI move &nbsp;
      <kbd>E</kbd> engine &nbsp;
      <kbd>N</kbd> new game
    </div>
  </div>

  <!-- ══ RIGHT PANEL: Mode + Engine + Puzzles ══════════════════════════ -->
  <div class="panel">

    <!-- Game controls -->
    <div class="card">
      <h3>Game</h3>

      <label>Mode</label>
      <select id="sel-mode" onchange="setSetting('mode', this.value)">
        <option value="human_vs_ai">Human vs AI</option>
        <option value="human_vs_human">Human vs Human</option>
        <option value="ai_vs_ai">AI vs AI</option>
        <option value="puzzle">Puzzle</option>
      </select>

      <div id="side-row">
        <label>You play as</label>
        <select id="sel-side" onchange="setSetting('human_side', this.value)">
          <option value="white">White</option>
          <option value="black">Black</option>
        </select>
      </div>

      <div class="toggle-row">
        <label>Argmax (greedy)</label>
        <input type="checkbox" id="chk-argmax" onchange="setSetting('argmax', this.checked)">
      </div>
      <div id="temp-row" style="display:none">
        <label>Temperature <span class="val" id="v-temp">1.0</span></label>
        <input type="range" id="sl-temp" min="0.1" max="2.0" step="0.1" value="1.0"
               oninput="document.getElementById('v-temp').textContent=parseFloat(this.value).toFixed(1)"
               onchange="setSetting('temperature', +this.value)">
      </div>

      <div class="toggle-row" style="margin-top:4px">
        <label>Engine analysis (E)</label>
        <input type="checkbox" id="chk-engine" checked onchange="setSetting('engine', this.checked)">
      </div>

      <div style="display:flex;gap:6px;margin-top:4px">
        <button class="btn btn-primary" style="flex:1" onclick="newGame()">New game</button>
        <button class="btn btn-danger"  style="flex:1" onclick="resetPos()">Reset</button>
      </div>
      <button class="btn" id="btn-ai" onclick="triggerAi()" style="display:none">AI Move ▶</button>
      <button class="btn" id="btn-pgn" onclick="copyPgn()" style="margin-top:4px" title="Copy PGN for Lichess / chess.com analysis">Copy PGN</button>
    </div>

    <!-- Engine analysis -->
    <div class="card" id="engine-panel">
      <h3>Engine Analysis</h3>
      <p style="font-size:.72rem;color:#6680aa;margin-bottom:6px">From-square (top 5)</p>
      <div id="from-bars"></div>
      <p style="font-size:.72rem;color:#6680aa;margin:6px 0 0">Top 5 moves</p>
      <table>
        <thead><tr><th>From</th><th>To</th><th>Prob</th></tr></thead>
        <tbody id="top-tbody"></tbody>
      </table>
    </div>

    <!-- Puzzles (always visible) -->
    <div class="card">
      <h3>Puzzles</h3>
      <div id="puzzle-prog"></div>
      <button class="btn" onclick="fetchPuzzles()">Load puzzles</button>
      <div class="puzzle-list" id="puzzle-list"></div>
    </div>

  </div>
</div>

<div id="spinner">⏳</div>

<script>
// ─────────────────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────────────────
let S       = {};
let pending = null;  // {from_sq, to_sq} awaiting promo choice

// ─────────────────────────────────────────────────────────────────────
// API
// ─────────────────────────────────────────────────────────────────────
function spin(on) { document.getElementById('spinner').style.display = on ? 'block' : 'none'; }

async function api(method, path, body) {
  spin(true);
  try {
    const opts = { method, headers: {'Content-Type': 'application/json'} };
    if (body !== undefined) opts.body = JSON.stringify(body);
    const r    = await fetch(path, opts);
    const data = await r.json();
    if (!r.ok) { alert(data.detail || 'Error'); return null; }
    return data;
  } finally { spin(false); }
}

// ─────────────────────────────────────────────────────────────────────
// Render
// ─────────────────────────────────────────────────────────────────────
function render(s) {
  if (!s) return;
  S = s;

  // Board SVG
  document.getElementById('board-svg').innerHTML = s.svg;

  // Rebuild click overlay
  buildOverlay(s.flipped, s.sq_size);

  // Status bar
  const msg = { checkmate:'♚ Checkmate!', stalemate:'½ Stalemate',
                draw:'½ Draw', check:'+ Check!', playing:'' };
  document.getElementById('status-bar').textContent = msg[s.status] || s.status;

  // Move label
  const n = s.history.length, idx = s.history_idx;
  document.getElementById('move-label').textContent =
    n === 0 ? 'Start' : (idx === 0 ? 'Start' :
      `Move ${Math.ceil(idx/2)} / ${Math.ceil(n/2)}`);

  // Nav buttons
  document.getElementById('btn-first').disabled = idx === 0;
  document.getElementById('btn-prev') .disabled = idx === 0;
  document.getElementById('btn-next') .disabled = idx >= n;
  document.getElementById('btn-last') .disabled = idx >= n;

  // Sync controls (avoid re-triggering events with a guard)
  syncEl('sel-mode',  s.mode);
  syncEl('sel-side',  s.human_side);
  syncRange('sl-we',  s.white_elo,    'v-we',   v => v);
  syncRange('sl-be',  s.black_elo,    'v-be',   v => v);
  syncRange('sl-wc',  s.white_clock_s,'v-wc',   fmtClock);
  syncRange('sl-bc',  s.black_clock_s,'v-bc',   fmtClock);
  syncRange('sl-inc', s.increment_s,  'v-inc',  v => v + 's');
  syncRange('sl-temp',s.temperature,  'v-temp', v => v.toFixed(1));
  document.getElementById('chk-argmax').checked = s.argmax;
  document.getElementById('chk-engine').checked = s.engine;

  // Visibility
  document.getElementById('side-row').style.display =
    s.mode === 'human_vs_ai' ? '' : 'none';
  document.getElementById('temp-row').style.display = s.argmax ? 'none' : '';
  const gameOver = ['checkmate','stalemate','draw'].includes(s.live_status);
  document.getElementById('btn-ai').style.display =
    (s.mode === 'ai_vs_ai' && s.at_latest && !gameOver) ? '' : 'none';

  // Engine panel
  document.getElementById('engine-panel').style.display = s.engine ? '' : 'none';
  if (s.engine && s.debug_info) renderEngine(s.debug_info);

  // Puzzle progress (always render, shows nothing when not in puzzle mode)
  renderPuzzleProgress(s.mode === 'puzzle' ? s.puzzle : null);
}

function syncEl(id, val) {
  const el = document.getElementById(id);
  if (el && el.value !== String(val)) el.value = val;
}
function syncRange(id, val, dispId, fmt) {
  const el = document.getElementById(id);
  if (el) el.value = val;
  const d  = document.getElementById(dispId);
  if (d)  d.textContent = fmt(val);
}

function buildOverlay(flipped, sqSize) {
  const ov = document.getElementById('board-overlay');
  ov.innerHTML = '';
  for (let row = 0; row < 8; row++) {
    for (let col = 0; col < 8; col++) {
      const rank = flipped ? row     : 7 - row;
      const file = flipped ? 7 - col : col;
      const sq   = rank * 8 + file;
      const div  = document.createElement('div');
      div.className  = 'sq';
      div.dataset.sq = sq;
      div.addEventListener('click', () => handleClick(sq));
      ov.appendChild(div);
    }
  }
}

// ─────────────────────────────────────────────────────────────────────
// Engine analysis panel
// ─────────────────────────────────────────────────────────────────────
function renderEngine(info) {
  // From-square bars (top 5)
  const fp   = info.from_probs;
  const top5 = fp.map((p,i)=>({sq:i,p})).sort((a,b)=>b.p-a.p).slice(0,5);
  document.getElementById('from-bars').innerHTML = top5.map(({sq,p}) => `
    <div class="prob-row">
      <span class="prob-lbl">${sqName(sq)}</span>
      <div  class="prob-bg"><div class="prob-fill"
        style="width:${(p*100).toFixed(1)}%;background:#3a7fd0"></div></div>
      <span class="prob-val">${(p*100).toFixed(1)}%</span>
    </div>`).join('');

  // Top moves table
  document.getElementById('top-tbody').innerHTML =
    info.top_moves.map(m => `<tr>
      <td>${sqName(m.from)}</td><td>${sqName(m.to)}</td>
      <td>${(m.prob*100).toFixed(1)}%</td></tr>`).join('');
}

// ─────────────────────────────────────────────────────────────────────
// Puzzle panel
// ─────────────────────────────────────────────────────────────────────
function renderPuzzleProgress(p) {
  const el = document.getElementById('puzzle-prog');
  if (!p) { el.innerHTML = ''; return; }
  const dots = [];
  for (let i = 0; i < p.total; i++) {
    const cls = i < p.done ? 'dot-ok' : (i === p.done ? 'dot-cur' : 'dot-pending');
    const txt = i < p.done ? '✓' : '';
    dots.push(`<div class="dot ${cls}">${txt}</div>`);
  }
  const solved = p.solved ? ' <span style="color:#30c060">Solved!</span>' : '';
  el.innerHTML = `
    <div style="font-size:.75rem;color:#6680aa;margin-bottom:5px">
      Rating: ${p.rating} · ${p.done}/${p.total}${solved}
    </div>
    <div class="puzzle-progress">${dots.join('')}</div>`;
}

async function fetchPuzzles() {
  const data = await api('GET', '/puzzles');
  if (!data) return;
  document.getElementById('puzzle-list').innerHTML =
    data.map(p => `
      <div class="puzzle-item" onclick="loadPuzzle('${p.id}')">
        <strong>★ ${p.rating}</strong> &nbsp; ${p.id}
      </div>`).join('');
}

async function loadPuzzle(id) {
  const s = await api('POST', `/puzzles/${id}`);
  render(s);
}

// ─────────────────────────────────────────────────────────────────────
// Click-to-move
// ─────────────────────────────────────────────────────────────────────
function handleClick(sq) {
  if (!S.at_latest) return;
  if (S.live_status !== 'playing' && S.live_status !== 'check') return;
  if (S.mode === 'ai_vs_ai') return;
  if (!S.human_turn) return;
  document.getElementById('promo-popup').style.display = 'none';
  api('POST', '/select', {sq}).then(data => {
    if (!data) return;
    if (data.need_promotion) {
      pending = {from_sq: data.from_sq, to_sq: data.to_sq};
      document.getElementById('promo-popup').style.display = 'block';
    } else {
      render(data);
    }
  });
}

function submitPromo(p) {
  if (!pending) return;
  document.getElementById('promo-popup').style.display = 'none';
  const uci = sqName(pending.from_sq) + sqName(pending.to_sq) + p;
  pending = null;
  api('POST', '/move', {uci}).then(render);
}

// ─────────────────────────────────────────────────────────────────────
// Controls
// ─────────────────────────────────────────────────────────────────────
async function setSetting(key, val) {
  render(await api('POST', '/settings', {[key]: val}));
}

async function newGame() {
  render(await api('POST', '/reset'));
  if (S.mode === 'human_vs_ai' && S.human_side === 'black') {
    render(await api('POST', '/ai_move'));
  }
}

async function resetPos() {
  render(await api('POST', '/reset'));
}

async function triggerAi() {
  render(await api('POST', '/ai_move'));
}

async function importPosition() {
  const text = document.getElementById('import-text').value.trim();
  if (!text) return;
  const s = await api('POST', '/import', {text});
  render(s);
}

// ─────────────────────────────────────────────────────────────────────
// Navigation
// ─────────────────────────────────────────────────────────────────────
async function navTo(idx) {
  render(await api('GET', `/history/${idx}`));
}
async function navRel(d) {
  const idx = Math.max(0, Math.min((S.history||[]).length, (S.history_idx||0) + d));
  await navTo(idx);
}
async function navLast() {
  await navTo((S.history||[]).length);
}

// ─────────────────────────────────────────────────────────────────────
// Keyboard
// ─────────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const tag = document.activeElement.tagName.toLowerCase();
  if (tag === 'textarea' || tag === 'input') return;
  if (e.key === 'ArrowLeft')  { e.preventDefault(); navRel(-1); }
  if (e.key === 'ArrowRight') { e.preventDefault(); navRel(1);  }
  if (e.key === 'e' || e.key === 'E') {
    const chk = document.getElementById('chk-engine');
    chk.checked = !chk.checked;
    setSetting('engine', chk.checked);
  }
  if (e.key === 'n' || e.key === 'N') { newGame(); }
  if (e.key === 'm' || e.key === 'M') {
    const btn = document.getElementById('btn-ai');
    if (btn.style.display !== 'none') triggerAi();
  }
});

// ─────────────────────────────────────────────────────────────────────
// Utilities
// ─────────────────────────────────────────────────────────────────────
function sqName(sq) {
  return 'abcdefgh'[sq % 8] + (Math.floor(sq / 8) + 1);
}
function fmtClock(s) {
  s = +s;
  if (s < 60)  return s + 's';
  const m = Math.floor(s / 60), r = s % 60;
  return r ? `${m}m${r}s` : `${m}m`;
}

// ─────────────────────────────────────────────────────────────────────
// PGN export
// ─────────────────────────────────────────────────────────────────────
async function copyPgn() {
  const data = await api('GET', '/pgn');
  if (!data) return;
  try {
    await navigator.clipboard.writeText(data.pgn);
    const btn = document.getElementById('btn-pgn');
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = orig; }, 1500);
  } catch {
    prompt('Copy PGN:', data.pgn);
  }
}

// ─────────────────────────────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────────────────────────────
(async () => { render(await api('GET', '/state')); })();
</script>
